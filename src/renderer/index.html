<!doctype html>
<html lang="pl" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <title>JPK Converter</title>
    <!-- CSP is set via Electron session API in production; removed from meta to allow Vite dev mode -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply saved theme before first paint to prevent FOUC
      try {
        var stored = JSON.parse(localStorage.getItem('jpk-theme') || '{}');
        if (stored.state && stored.state.theme) {
          document.documentElement.setAttribute('data-theme', stored.state.theme);
        }
      } catch (e) {}
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
